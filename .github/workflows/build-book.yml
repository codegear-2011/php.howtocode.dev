name: Build Book

on:
push:
branches:
- main
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v4

  - uses: actions/setup-node@v4
    with:
      node-version: '18'

  - name: Install HonKit
    run: npm install -g honkit

  - name: Install Dependencies
    run: honkit install

  - name: Build Website
    run: honkit build

  - name: Install Calibre
    run: |
      sudo apt-get update
      sudo apt-get install -y calibre

  - name: Generate EPUB
    run: honkit epub php-learning-book.epub

  - name: Generate PDF
    run: honkit pdf . php-learning-book.pdf

  - name: Upload Files
    uses: actions/upload-artifact@v4
    with:
      name: book-files
      path: |
        php-learning-book.epub
        php-learning-book.pdf
```
