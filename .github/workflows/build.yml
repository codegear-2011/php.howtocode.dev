name: Build Book

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install HonKit
        run: npm install -g honkit

      - name: Install Book Dependencies
        run: honkit install

      - name: Build Website
        run: honkit build

      - name: Install Calibre
        run: |
          sudo apt-get update
          sudo apt-get install -y calibre

      - name: Generate EPUB
        run: honkit epub . php-learning-book.epub

      - name: Generate PDF
        run: honkit pdf . php-learning-book.pdf

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: php-learning-book
          path: |
            _book/
            php-learning-book.epub
            php-learning-book.pdf
